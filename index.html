<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>موقع نُور - الواجهة الرئيسية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.1); --border: rgba(255, 255, 255, 0.15); --accent: #c5a02d; }
        body {
            font-family: 'Tajawal', sans-serif; margin: 0; 
            background: radial-gradient(circle at top right, #1e293b, #0f172a, #020617);
            background-attachment: fixed; color: white; min-height: 100vh;
        }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        header { text-align: center; padding: 40px 0; }
        header h1 { font-family: 'Amiri', serif; font-size: 3.5rem; color: var(--accent); margin: 0; text-shadow: 0 5px 15px rgba(0,0,0,0.3); }

        .prayer-panel { 
            background: var(--glass); backdrop-filter: blur(20px); 
            border-radius: 30px; padding: 30px; margin-bottom: 40px; 
            border: 1px solid var(--border);
        }
        .controls { display: flex; flex-wrap: wrap; gap: 15px; justify-content: center; margin-bottom: 30px; }
        select { 
            padding: 12px 25px; border-radius: 50px; background: rgba(0,0,0,0.8); 
            color: white; border: 1px solid var(--border); cursor: pointer; font-family: 'Tajawal';
        }
        
        .times-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 20px; }
        .time-card { 
            background: rgba(255,255,255,0.03); padding: 20px; border-radius: 20px; 
            border-bottom: 4px solid var(--accent); text-align: center;
        }
        .time-card strong { font-size: 22px; color: var(--accent); display: block; }

        .main-menu { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; padding-bottom: 50px; }
        .menu-item { 
            background: var(--glass); padding: 30px; border-radius: 25px; 
            text-align: center; text-decoration: none; color: white; 
            border: 1px solid var(--border); transition: 0.4s; 
        }
        .menu-item:hover { background: rgba(197, 160, 45, 0.15); transform: translateY(-10px); border-color: var(--accent); }
        .menu-item i { font-size: 35px; color: var(--accent); margin-bottom: 15px; display: block; }
    </style>
</head>
<body>
<div class="container">
    <header>
        <h1>نُور الهدى</h1>
        <p>مواقيت الصلاة والمعالم الإسلامية</p>
    </header>

    <div class="prayer-panel">
        <div class="controls">
            <select id="cSelect" onchange="fetchPrayers()"></select>
            <select id="tFormat" onchange="fetchPrayers()">
                <option value="12">نظام 12 ساعة</option>
                <option value="24">نظام 24 ساعة</option>
            </select>
        </div>
        <div class="times-grid">
            <div class="time-card"><div>الفجر</div><strong id="Fajr">--:--</strong></div>
            <div class="time-card"><div>الظهر</div><strong id="Dhuhr">--:--</strong></div>
            <div class="time-card"><div>العصر</div><strong id="Asr">--:--</strong></div>
            <div class="time-card"><div>المغرب</div><strong id="Maghrib">--:--</strong></div>
            <div class="time-card"><div>العشاء</div><strong id="Isha">--:--</strong></div>
        </div>
    </div>

    <div class="main-menu">
        <a href="quran.html" class="menu-item"><i class="fa-solid fa-book-quran"></i><h4>المصحف</h4></a>
        <a href="mosques.html" class="menu-item"><i class="fa-solid fa-mosque"></i><h4>المساجد</h4></a>
        <a href="battles.html" class="menu-item"><i class="fa-solid fa-shield-halved"></i><h4>الغزوات</h4></a>
        <a href="hadith.html" class="menu-item"><i class="fa-solid fa-scroll"></i><h4>الأحاديث</h4></a>
        <a href="prophets.html" class="menu-item"><i class="fa-solid fa-tree"></i><h4>الأنبياء</h4></a>
        <a href="pillars.html" class="menu-item"><i class="fa-solid fa-star-and-crescent"></i><h4>أركان الدين</h4></a>
        <a href="audio.html" class="menu-item"><i class="fa-solid fa-microphone"></i><h4>القراء</h4></a>
        <a href="sira.html" class="menu-item"><i class="fa-solid fa-heart"></i><h4>السيرة النبوية</h4></a>
    </div>
</div>

<script>
    const countries = [
        {n: "مصر", v: "Egypt", c: "Cairo"}, {n: "السعودية", v: "Saudi Arabia", c: "Mecca"},
        {n: "الإمارات", v: "UAE", c: "Dubai"}, {n: "الكويت", v: "Kuwait", c: "Kuwait City"},
        {n: "الأردن", v: "Jordan", c: "Amman"}, {n: "المغرب", v: "Morocco", c: "Rabat"}
    ];
    function init() {
        const sel = document.getElementById('cSelect');
        countries.sort((a,b)=>a.n.localeCompare(b.n)).forEach(c=>{
            let o = document.createElement('option');
            o.value = JSON.stringify(c); o.innerText = c.n; sel.appendChild(o);
        });
        fetchPrayers();
    }
    async function fetchPrayers() {
        const val = document.getElementById('cSelect').value;
        const data = JSON.parse(val);
        const format = document.getElementById('tFormat').value;
        const res = await fetch(`https://api.aladhan.com/v1/timingsByCity?city=${data.c}&country=${data.v}&method=4`);
        const json = await res.json();
        const t = json.data.timings;
        ['Fajr', 'Dhuhr', 'Asr', 'Maghrib', 'Isha'].forEach(p => {
            let time = t[p];
            if(format === "12") {
                let [h, m] = time.split(':');
                let ampm = h >= 12 ? ' م' : ' ص';
                h = h % 12 || 12;
                time = h + ":" + m + ampm;
            }
            document.getElementById(p).innerText = time;
        });
    }
    window.onload = init;
</script>
</body>
</html>
