<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مكتبة نُور - Glass Liquid Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --accent: #c5a02d; /* لون ذهبي خافت */
            --dark-bg: #0f172a; /* لون خلفية عميق ليناسب التصميم السائل */
        }

        body {
            font-family: 'Tajawal', sans-serif;
            margin: 0;
            padding-bottom: 160px;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            background-attachment: fixed;
            color: white;
            min-height: 100vh;
        }

        /* تأثيرات سائلة في الخلفية */
        .liquid-bg {
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            z-index: -1;
            background: radial-gradient(circle, rgba(197, 160, 45, 0.05) 0%, transparent 50%);
            animation: liquidMove 15s infinite alternate ease-in-out;
        }

        @keyframes liquidMove {
            0% { transform: translate(0, 0) rotate(0deg); }
            100% { transform: translate(5%, 10%) rotate(10deg); }
        }

        header {
            padding: 50px 20px;
            text-align: center;
        }

        header h1 {
            font-family: 'Amiri', serif;
            font-size: 3rem;
            margin: 0;
            background: linear-gradient(to bottom, #fff, var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .container {
            max-width: 1100px;
            margin: auto;
            padding: 0 20px;
        }

        /* صندوق اختيار القارئ - زجاجي */
        .glass-card {
            background: var(--glass-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 25px;
            padding: 25px;
            margin-bottom: 40px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
        }

        select {
            width: 100%;
            max-width: 450px;
            padding: 15px 25px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            background: rgba(255, 255, 255, 0.05);
            color: white;
            font-family: 'Tajawal';
            font-size: 16px;
            outline: none;
            cursor: pointer;
            transition: 0.3s;
            text-align: center;
        }

        select option { background: #1e293b; color: white; }

        /* شبكة السور */
        .surah-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
            gap: 15px;
        }

        .surah-item {
            background: var(--glass-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid var(--glass-border);
            padding: 20px;
            border-radius: 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
            overflow: hidden;
        }

        .surah-item:hover {
            background: rgba(255, 255, 255, 0.15);
            transform: translateY(-8px);
            border-color: var(--accent);
            box-shadow: 0 10px 25px rgba(197, 160, 45, 0.2);
        }

        .surah-item i {
            display: block;
            margin-bottom: 12px;
            font-size: 24px;
            color: var(--accent);
        }

        .surah-name { font-weight: 500; font-size: 16px; }

        /* المشغل السائل الثابت */
        .liquid-player {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            padding: 20px 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            gap: 15px;
            z-index: 1000;
        }

        .player-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .status-dot {
            width: 10px;
            height: 10px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--accent);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 1; }
            100% { transform: scale(2); opacity: 0; }
        }

        .track-text b { display: block; font-size: 18px; color: #fff; }
        .track-text small { color: rgba(255,255,255,0.6); }

        audio {
            width: 100%;
            height: 40px;
            filter: invert(100%) hue-rotate(180deg) brightness(1.5); /* لجعل شكل المشغل يتماشى مع الألوان الداكنة */
        }

        /* شريط التمرير */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: var(--dark-bg); }
        ::-webkit-scrollbar-thumb { background: var(--glass-border); border-radius: 10px; }

    </style>
</head>
<body>

<div class="liquid-bg"></div>

<header>
    <h1>مكتبة نُور الهدى</h1>
    <p>استمع لأفضل شيوخ الوطن العربي</p>
</header>

<div class="container">
    <div class="glass-card">
        <select id="qariSelect" onchange="loadSurahs()">
            <option value="https://server13.mp3quran.net/husr/">1. محمود خليل الحصري</option>
            <option value="https://server11.mp3quran.net/yasser/">2. ياسر الدوسري</option>
            <option value="https://server7.mp3quran.net/basit/MTL/">3. عبد الباسط عبد الصمد</option>
            <option value="https://server10.mp3quran.net/minsh/">4. محمد صديق المنشاوي</option>
            <option value="https://server8.mp3quran.net/afs/">5. مشاري راشد العفاسي</option>
            <option value="https://server12.mp3quran.net/maher/">6. ماهر المعيقلي</option>
            <option value="https://server10.mp3quran.net/ajm/">7. أحمد بن علي العجمي</option>
            <option value="https://server6.mp3quran.net/idrees/">8. إدريس أبكر</option>
            <option value="https://server11.mp3quran.net/shatri/">9. أبو بكر الشاطري</option>
            <option value="https://server8.mp3quran.net/frs_a/">10. فارس عباد</option>
            <option value="https://server6.mp3quran.net/qtm/">11. ناصر القطامي</option>
            <option value="https://server8.mp3quran.net/bo_khtr/">12. صلاح بو خاطر</option>
            <option value="https://server9.mp3quran.net/soufi/hamza/">13. عبد الرشيد صوفي</option>
            <option value="https://server7.mp3quran.net/shur/">14. سعود الشريم</option>
            <option value="https://server8.mp3quran.net/hani/">15. هاني الرفاعي</option>
        </select>
    </div>

    <div class="surah-grid" id="grid"></div>
</div>

<div class="liquid-player">
    <div class="player-info">
        <div class="status-dot"></div>
        <div class="track-text">
            <b id="surahTitle">اختر سورة للبدء</b>
            <small id="qariName">15 قارئاً متاحاً</small>
        </div>
    </div>
    <audio id="audioPlayer" controls></audio>
</div>

<script>
    const surahs = ["الفاتحة","البقرة","آل عمران","النساء","المائدة","الأنعام","الأعراف","الأنفال","التوبة","يونس","هود","يوسف","الرعد","إبراهيم","الحجر","النحل","الإسراء","الكهف","مريم","طه","الأنبياء","الحج","المؤمنون","النور","الفرقان","الشعراء","النمل","القصص","العنكبوت","الروم","لقمان","السجدة","الأحزاب","سبأ","فاطر","يس","الصافات","ص","الزمر","غافر","فصلت","الشورى","الزخرف","الدخان","الجاثية","الأحقاف","محمد","الفتح","الحجرات","ق","الذاريات","الطور","النجم","القمر","الرحمن","الواقعة","الحديد","المجادلة","الحشر","الممتحنة","الصف","الجمعة","المنافقون","التغابن","الطلاق","التحريم","الملك","القلم","الحاقة","المعارج","نوح","الجن","المزمل","المدثر","القيامة","الإنسان","المرسلات","النبأ","النازعات","عبس","التكوير","الانفطار","المطففين","الانشقاق","البروج","الطارق","الأعلى","الغاشية","الفجر","البلد","الشمس","الليل","الضحى","الشرح","التين","العلق","القدر","البينة","الزلزلة","العاديات","القارعة","التكاثر","العصر","الهمزة","الفيل","قريش","الماعون","الكوثر","الكافرون","النصر","المسد","الإخلاص","الفلق","الناس"];

    function loadSurahs() {
        const grid = document.getElementById('grid');
        grid.innerHTML = '';
        surahs.forEach((name, i) => {
            const div = document.createElement('div');
            div.className = 'surah-item';
            div.onclick = () => play(i + 1, name);
            div.innerHTML = `
                <i class="fa-solid fa-moon"></i>
                <div class="surah-name">${name}</div>
            `;
            grid.appendChild(div);
        });
    }

    function play(id, name) {
        const baseUrl = document.getElementById('qariSelect').value;
        const qari = document.getElementById('qariSelect').options[document.getElementById('qariSelect').selectedIndex].text;
        const sNum = id.toString().padStart(3, '0');
        
        const player = document.getElementById('audioPlayer');
        player.src = `${baseUrl}${sNum}.mp3`;
        player.play();

        document.getElementById('surahTitle').innerText = "سورة " + name;
        document.getElementById('qariName').innerText = "تلاوة: " + qari;
    }

    window.onload = loadSurahs;
</script>

</body>
</html>
