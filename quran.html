<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المصحف الشريف - Glass Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.1); --border: rgba(255, 255, 255, 0.2); --accent: #c5a02d; }
        body { font-family: 'Tajawal', sans-serif; margin: 0; background: #0f172a; color: white; min-height: 100vh; }
        .header { padding: 40px; text-align: center; }
        .header h1 { font-family: 'Amiri', serif; font-size: 3rem; color: var(--accent); margin: 0; }
        
        .container { max-width: 900px; margin: auto; padding: 20px; }
        .glass-box { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid var(--border); border-radius: 30px; padding: 30px; box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        
        .waqf-guide { display: flex; flex-wrap: wrap; justify-content: center; gap: 15px; margin-bottom: 20px; font-size: 13px; opacity: 0.8; }
        .waqf-guide b { color: var(--accent); }

        select { width: 100%; padding: 15px; border-radius: 50px; background: rgba(0,0,0,0.5); color: white; border: 1px solid var(--accent); margin-bottom: 30px; }
        
        .quran-text { font-family: 'Amiri', serif; font-size: 30px; line-height: 2.2; text-align: center; color: #fff; }
        .ayah-num { color: var(--accent); font-weight: bold; margin: 0 5px; }
        .back-btn { display: inline-block; color: var(--accent); text-decoration: none; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="index.html" class="back-btn"><i class="fa-solid fa-arrow-right"></i> العودة للرئيسية</a>
        <div class="header"><h1>المصحف الإلكتروني</h1></div>
        
        <div class="glass-box">
            <div class="waqf-guide">
                <span><b>م</b> وقف لازم</span> <span><b>لا</b> ممنوع الوقف</span> <span><b>ج</b> جائز</span> <span><b>صلى</b> الوصل أولى</span>
            </div>
            
            <select id="surahList" onchange="loadSurah()">
                <option value="">-- اختر السورة --</option>
            </select>

            <div id="sText" class="quran-text">اختر سورة لتبدأ القراءة بالخط العثماني...</div>
        </div>
    </div>

    <script>
        async function init() {
            const res = await fetch('https://api.alquran.cloud/v1/surah');
            const data = await res.json();
            data.data.forEach(s => {
                let opt = document.createElement('option');
                opt.value = s.number; opt.innerText = s.number + ". " + s.name;
                document.getElementById('surahList').appendChild(opt);
            });
        }
        async function loadSurah() {
            const num = document.getElementById('surahList').value;
            if(!num) return;
            const res = await fetch(`https://api.alquran.cloud/v1/surah/${num}/quran-uthmani`);
            const data = await res.json();
            let fullText = "";
            data.data.ayahs.forEach(a => fullText += a.text + ` <span class="ayah-num">﴿${a.numberInSurah}﴾</span> `);
            document.getElementById('sText').innerHTML = fullText;
        }
        init();
    </script>
</body>
</html>
