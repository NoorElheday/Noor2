<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>أركان الدين - Glass Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.1); --accent: #c5a02d; }
        body { font-family: 'Tajawal', sans-serif; background: #0f172a; color: white; margin: 0; min-height: 100vh; }
        .container { max-width: 1000px; margin: auto; padding: 40px 20px; }
        .header { text-align: center; margin-bottom: 40px; }
        .header h1 { font-family: 'Amiri', serif; font-size: 3rem; color: var(--accent); }
        
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 25px; }
        .glass-card { background: var(--glass); backdrop-filter: blur(15px); border: 1px solid rgba(255,255,255,0.2); border-radius: 25px; padding: 30px; transition: 0.3s; }
        .glass-card:hover { border-color: var(--accent); transform: translateY(-10px); }
        .glass-card h2 { color: var(--accent); font-family: 'Amiri', serif; margin-top: 0; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 10px; }
        
        ul { list-style: none; padding: 0; }
        li { margin-bottom: 12px; position: relative; padding-right: 30px; }
        li::before { content: "\f14a"; font-family: "Font Awesome 6 Free"; font-weight: 900; position: absolute; right: 0; color: var(--accent); }
        .back-btn { color: var(--accent); text-decoration: none; display: block; margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="hoome.html" class="back-btn"><i class="fa-solid fa-arrow-right"></i> العودة للرئيسية</a>
        <div class="header"><h1>ثوابت الدين وصفة الصلاة</h1></div>
        
        <div class="grid">
            <div class="glass-card">
                <h2>أركان الإسلام (٥)</h2>
                <ul><li>الشهادتان</li><li>إقام الصلاة</li><li>إيتاء الزكاة</li><li>صوم رمضان</li><li>حج البيت</li></ul>
            </div>
            <div class="glass-card">
                <h2>أركان الإيمان (٦)</h2>
                <ul><li>الإيمان بالله</li><li>ملائكته</li><li>كتبه</li><li>رسله</li><li>اليوم الآخر</li><li>القدر</li></ul>
            </div>
        </div>
    </div>
</body>
</html>
