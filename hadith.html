<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>50 حديثاً نبوياً - Glass Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.05); --accent: #c5a02d; }
        body { font-family: 'Tajawal', sans-serif; background: #020617; color: white; margin: 0; }
        .container { max-width: 900px; margin: auto; padding: 40px 20px; }
        h1 { text-align: center; font-family: 'Amiri', serif; font-size: 3rem; color: var(--accent); margin-bottom: 40px; }
        
        .hadith-container { display: flex; flex-direction: column; gap: 20px; }
        .hadith-card { 
            background: var(--glass); backdrop-filter: blur(15px); 
            border-radius: 20px; padding: 25px; border: 1px solid rgba(255,255,255,0.1);
            border-right: 4px solid var(--accent); transition: 0.3s;
        }
        .hadith-card:hover { transform: scale(1.02); background: rgba(255,255,255,0.08); }
        .hadith-num { color: var(--accent); font-weight: bold; font-size: 14px; margin-bottom: 10px; display: block; }
        .hadith-text { font-family: 'Amiri', serif; font-size: 22px; line-height: 1.8; color: #fff; }
        .hadith-ref { color: rgba(255,255,255,0.4); font-size: 13px; margin-top: 10px; text-align: left; }
        
        .back-btn { color: var(--accent); text-decoration: none; display: block; margin-bottom: 30px; }
    </style>
</head>
<body>
    <div class="container">
        <a href="hoome.html" class="back-btn"><i class="fa-solid fa-arrow-right"></i> العودة للرئيسية</a>
        <h1>أكثر من ٥٠ حديثاً نبوياً صحيحاً</h1>
        
        <div class="hadith-container" id="hadithList">
            </div>
    </div>

    <script>
        const hadiths = [
            {t: "إنما الأعمال بالنيات، وإنما لكل امرئ ما نوى", r: "متفق عليه"},
            {t: "الدين النصيحة", r: "رواه مسلم"},
            {t: "من كان يؤمن بالله واليوم الآخر فليقل خيراً أو ليصمت", r: "متفق عليه"},
            {t: "لا يؤمن أحدكم حتى يحب لأخيه ما يحب لنفسه", r: "متفق عليه"},
            {t: "من حسن إسلام المرء تركه ما لا يعنيه", r: "رواه الترمذي"},
            {t: "خيركم من تعلم القرآن وعلمه", r: "رواه البخاري"},
            {t: "تبسمك في وجه أخيك لك صدقة", r: "رواه الترمذي"},
            {t: "كلمتان خفيفتان على اللسان، ثقيلتان في الميزان: سبحان الله وبحمده، سبحان الله العظيم", r: "متفق عليه"},
            {t: "المسلم من سلم المسلمون من لسانه ويده", r: "متفق عليه"},
            {t: "اتق الله حيثما كنت، وأتبع السيئة الحسنة تمحها", r: "رواه الترمذي"},
            {t: "الطهور شطر الإيمان", r: "رواه مسلم"},
            {t: "الحياء لا يأتي إلا بخير", r: "متفق عليه"},
            {t: "من سلك طريقاً يلتمس فيه علماً سهل الله له به طريقاً إلى الجنة", r: "رواه مسلم"},
            {t: "لا تدخلون الجنة حتى تؤمنوا، ولا تؤمنوا حتى تحابوا", r: "رواه مسلم"},
            {t: "يسروا ولا تعسروا، وبشروا ولا تنفروا", r: "متفق عليه"},
            {t: "من صلى علي واحدة صلى الله عليه بها عشراً", r: "رواه مسلم"},
            {t: "المرء مع من أحب", r: "متفق عليه"},
            {t: "أحب الأعمال إلى الله أدومها وإن قل", r: "متفق عليه"},
            {t: "إن الله جميل يحب الجمال", r: "رواه مسلم"},
            {t: "ليس الشديد بالصرعة، إنما الشديد الذي يملك نفسه عند الغضب", r: "متفق عليه"},
            {t: "من غشنا فليس منا", r: "رواه مسلم"},
            {t: "كل مسكر خمر، وكل خمر حرام", r: "رواه مسلم"},
            {t: "الدال على الخير كفاعله", r: "رواه الترمذي"},
            {t: "أعطوا الأجير أجره قبل أن يجف عرقه", r: "رواه ابن ماجه"},
            {t: "سباب المسلم فسوق وقتاله كفر", r: "متفق عليه"},
            {t: "من كان في حاجة أخيه كان الله في حاجته", r: "متفق عليه"},
            {t: "أفضل الذكر: لا إله إلا الله", r: "رواه الترمذي"},
            {t: "من بنى مسجداً لله بنى الله له بيتاً في الجنة", r: "متفق عليه"},
            {t: "صم من كل شهر ثلاثة أيام", r: "رواه النسائي"},
            {t: "نعمتان مغبون فيهما كثير من الناس: الصحة والفراغ", r: "رواه البخاري"},
            {t: "الدنيا سجن المؤمن وجنة الكافر", r: "رواه مسلم"},
            {t: "لا يشكر الله من لا يشكر الناس", r: "رواه أبو داود"},
            {t: "البر حسن الخلق", r: "رواه مسلم"},
            {t: "اتقوا النار ولو بشق تمرة", r: "متفق عليه"},
            {t: "الظلم ظلمات يوم القيامة", r: "متفق عليه"},
            {t: "من يرد الله به خيراً يفقهه في الدين", r: "متفق عليه"},
            {t: "الصلاة نور، والصدقة برهان", r: "رواه مسلم"},
            {t: "ما نقصت صدقة من مال", r: "رواه مسلم"},
            {t: "من دل على خير فله مثل أجر فاعله", r: "رواه مسلم"},
            {t: "أكمل المؤمنين إيماناً أحسنهم خلقاً", r: "رواه الترمذي"},
            {t: "خيركم خيركم لأهله", r: "رواه الترمذي"},
            {t: "ركعتا الفجر خير من الدنيا وما فيها", r: "رواه مسلم"},
            {t: "الدعاء هو العبادة", r: "رواه أبو داود"},
            {t: "لا يرحم الله من لا يرحم الناس", r: "متفق عليه"},
            {t: "سيد الاستغفار أن تقول: اللهم أنت ربي لا إله إلا أنت..", r: "رواه البخاري"},
            {t: "من صام رمضان ثم أتبعه ستاً من شوال كان كصيام الدهر", r: "رواه مسلم"},
            {t: "تهادوا تحابوا", r: "رواه البخاري في الأدب المفرد"},
            {t: "إذا مات ابن آدم انقطع عمله إلا من ثلاث..", r: "رواه مسلم"},
            {t: "أقرب ما يكون العبد من ربه وهو ساجد", r: "رواه مسلم"},
            {t: "العين حق", r: "متفق عليه"},
            {t: "يا غلام سم الله، وكل بيمينك، وكل مما يليك", r: "متفق عليه"}
        ];

        const list = document.getElementById('hadithList');
        hadiths.forEach((h, i) => {
            const card = document.createElement('div');
            card.className = 'hadith-card';
            card.innerHTML = `
                <span class="hadith-num">حديث رقم ${i+1}</span>
                <div class="hadith-text">"${h.t}"</div>
                <div class="hadith-ref">${h.r}</div>
            `;
            list.appendChild(card);
        });
    </script>
</body>
</html>
