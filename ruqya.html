<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>الرقية الشرعية</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri&family=Tajawal&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #fdfbf7; padding: 30px; line-height: 1.8; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; border-right: 5px solid #2d5a27; }
        h2 { font-family: 'Amiri', serif; color: #2d5a27; }
    </style>
</head>
<body>
    <h1>الرقية الشرعية الكاملة</h1>
    <div class="card">
        <h2>من القرآن الكريم</h2>
        <p>قراءة سورة الفاتحة، آية الكرسي، والإخلاص والمعوذتين.</p>
    </div>
    <div class="card">
        <h2>من السنة النبوية</h2>
        <p>"أعوذ بكلمات الله التامات من شر ما خلق" (3 مرات).</p>
        <p>"أذهب البأس رب الناس، اشف وأنت الشافي".</p>
    </div>
</body>
</html>
